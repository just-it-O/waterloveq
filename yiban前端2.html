<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>网页</title>
    <script src="https://cdn.tailwindcss.com/3.4.16"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f5f5;
            width: 100%;
            margin: 0;
            min-height: 100vh;
            position: relative;
        }
        .nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 44px;
            background: linear-gradient(180deg, #7EC8F8 0%, #5BA8E6 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            z-index: 100;
            color: white;
        }
        .nav-bar h1 {
            font-size: 17px;
            font-weight: 500;
            margin: 0;
        }
        .nav-bar button {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .header-section {
            padding-top: 44px;
            height: 200px;
            background: linear-gradient(180deg, #5BA8E6 0%, #3D8FDD 100%);
            position: relative;
            overflow: hidden;
        }
        .header-bg {
            position: absolute;
            right: -50px;
            bottom: -30px;
            width: 280px;
            height: 200px;
            opacity: 0.15;
        }
        .stats-container {
            display: flex;
            justify-content: center;
            gap: 70px;
            padding-top: 30px;
            position: relative;
            z-index: 1;
        }
        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .stat-number {
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .stat-number span {
            font-size: 28px;
            font-weight: 300;
            color: #3D8FDD;
        }
        .stat-label {
            font-size: 14px;
            color: white;
            font-weight: 400;
        }
        .content-section {
            background: #f5f5f5;
            padding: 0 15px 20px;
            margin-top: -30px;
            position: relative;
            z-index: 2;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px 10px;
        }
        .grid-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }
        .icon-wrapper {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 6px;
        }
        .icon-wrapper img {
            width: 32px;
            height: 32px;
        }
        .item-label {
            font-size: 12px;
            color: #333;
            margin: 0;
            white-space: nowrap;
        }
        .bg-yellow { background-color: #FFF7E6; }
        .bg-green { background-color: #E8F5E9; }
        .bg-pink { background-color: #FCE4EC; }
        .bg-blue { background-color: #E3F2FD; }
    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <div class="nav-bar">
        <button id="backButton1">
            <span style="font-size: 24px; line-height: 1;">＜</span>
        </button>
        <h1>网页</h1>
        <button>
            <span style="font-size: 24px; line-height: 1;">…</span>
        </button>
    </div>
    
    <!-- 顶部统计区域 -->
    <div class="header-section">
        <svg class="header-bg" viewBox="0 0 200 150" fill="none">
            <rect x="20" y="30" width="40" height="40" rx="4" fill="white"/>
            <rect x="70" y="20" width="50" height="50" rx="4" fill="white"/>
            <rect x="140" y="40" width="30" height="30" rx="3" fill="white"/>
            <rect x="30" y="80" width="60" height="50" rx="4" fill="white"/>
            <rect x="110" y="90" width="45" height="40" rx="3" fill="white"/>
            <circle cx="175" cy="130" r="15" fill="white"/>
        </svg>
        
        <div class="stats-container">
            <div class="stat-item">
                <div class="stat-number">
                    <span>0</span>
                </div>
                <span class="stat-label">消息</span>
            </div>
            <div class="stat-item">
                <div class="stat-number">
                    <span>0</span>
                </div>
                <span class="stat-label">工作台</span>
            </div>
        </div>
    </div>
    
    <!-- 功能图标区域 -->
    <div class="content-section">
        <div class="grid-container">
            <!-- 第一行 -->
            <div class="grid-item">
                <div class="icon-wrapper bg-yellow">
                    <svg viewBox="0 0 48 48" fill="none">
                        <rect x="8" y="12" width="32" height="28" rx="4" fill="#FFB74D"/>
                        <rect x="12" y="18" width="24" height="16" rx="2" fill="white"/>
                        <line x1="16" y1="24" x2="32" y2="24" stroke="#FFB74D" stroke-width="1.5"/>
                        <line x1="16" y1="28" x2="28" y2="28" stroke="#FFB74D" stroke-width="1.5"/>
                        <circle cx="36" cy="20" r="4" fill="#FFB74D"/>
                        <path d="M34 18L35 20L38 17" stroke="white" stroke-width="1.5" fill="none"/>
                    </svg>
                </div>
                <p class="item-label">综合测评</p>
            </div>
            
            <div class="grid-item">
                <div class="icon-wrapper bg-green">
                    <svg viewBox="0 0 48 48" fill="none">
                        <rect x="8" y="10" width="32" height="30" rx="4" fill="#66BB6A"/>
                        <circle cx="24" cy="20" r="6" fill="white"/>
                        <rect x="18" y="28" width="12" height="8" rx="2" fill="white"/>
                        <line x1="20" y1="31" x2="28" y2="31" stroke="#66BB6A" stroke-width="1.5"/>
                        <line x1="20" y1="34" x2="26" y2="34" stroke="#66BB6A" stroke-width="1.5"/>
                    </svg>
                </div>
                <p class="item-label">在校证明</p>
            </div>
            
            <div class="grid-item">
                <div class="icon-wrapper bg-pink">
                    <svg viewBox="0 0 48 48" fill="none">
                        <rect x="8" y="10" width="32" height="30" rx="4" fill="#F48FB1"/>
                        <rect x="12" y="14" width="24" height="22" rx="2" fill="white"/>
                        <rect x="16" y="18" width="16" height="14" rx="1" fill="#F48FB1"/>
                        <path d="M18 24L21 27L28 20" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <p class="item-label">离校系统</p>
            </div>
            
            <div class="grid-item">
                <div class="icon-wrapper bg-blue">
                    <svg viewBox="0 0 48 48" fill="none">
                        <rect x="8" y="10" width="32" height="30" rx="4" fill="#64B5F6"/>
                        <rect x="12" y="14" width="24" height="22" rx="2" fill="white"/>
                        <circle cx="32" cy="28" r="4" fill="#64B5F6"/>
                        <path d="M30 28L32 30L34 26" stroke="white" stroke-width="2" fill="none"/>
                        <line x1="16" y1="20" x2="28" y2="20" stroke="#64B5F6" stroke-width="1.5"/>
                        <line x1="16" y1="24" x2="26" y2="24" stroke="#64B5F6" stroke-width="1.5"/>
                        <line x1="16" y1="28" x2="24" y2="28" stroke="#64B5F6" stroke-width="1.5"/>
                    </svg>
                </div>
                <p class="item-label">信息完善</p>
            </div>
            
            <!-- 第二行 -->
            <div class="grid-item">
                <div class="icon-wrapper bg-blue">
                    <svg viewBox="0 0 48 48" fill="none">
                        <circle cx="24" cy="24" r="18" fill="#64B5F6"/>
                        <circle cx="24" cy="24" r="12" fill="white"/>
                        <circle cx="24" cy="18" r="3" fill="#64B5F6"/>
                        <path d="M24 24L24 30L28 33" stroke="#64B5F6" stroke-width="2" fill="none" stroke-linecap="round"/>
                        <text x="24" y="26" text-anchor="middle" font-size="8" fill="#64B5F6" font-weight="bold">预</text>
                    </svg>
                </div>
                <p class="item-label">预报到</p>
            </div>
            
            <div class="grid-item">
                <div class="icon-wrapper bg-blue">
                    <svg viewBox="0 0 48 48" fill="none">
                        <rect x="10" y="12" width="28" height="30" rx="4" fill="#64B5F6"/>
                        <path d="M14 20L18 26L26 18L34 28L14 36Z" fill="white"/>
                        <circle cx="30" cy="22" r="4" fill="white"/>
                        <text x="30" y="24" text-anchor="middle" font-size="5" fill="#64B5F6" font-weight="bold">¥</text>
                    </svg>
                </div>
                <p class="item-label">生源地贷款</p>
            </div>
            
            <div class="grid-item">
                <div class="icon-wrapper bg-green">
                    <svg viewBox="0 0 48 48" fill="none">
                        <rect x="10" y="10" width="28" height="30" rx="4" fill="#66BB6A"/>
                        <rect x="14" y="14" width="20" height="18" rx="2" fill="white"/>
                        <line x1="17" y1="20" x2="27" y2="20" stroke="#66BB6A" stroke-width="1.5"/>
                        <line x1="17" y1="24" x2="25" y2="24" stroke="#66BB6A" stroke-width="1.5"/>
                        <circle cx="30" cy="28" r="5" fill="white"/>
                        <path d="M28 28L30 30L33 27" stroke="#66BB6A" stroke-width="2" fill="none"/>
                    </svg>
                </div>
                <p class="item-label">晚点签到</p>
            </div>
            
            <div class="grid-item">
                <div class="icon-wrapper bg-yellow">
                    <svg viewBox="0 0 48 48" fill="none">
                        <rect x="10" y="10" width="28" height="30" rx="4" fill="#FFB74D"/>
                        <rect x="14" y="14" width="20" height="18" rx="2" fill="white"/>
                        <line x1="17" y1="20" x2="27" y2="20" stroke="#FFB74D" stroke-width="1.5"/>
                        <line x1="17" y1="24" x2="25" y2="24" stroke="#FFB74D" stroke-width="1.5"/>
                        <line x1="17" y1="28" x2="23" y2="28" stroke="#FFB74D" stroke-width="1.5"/>
                    </svg>
                </div>
                <p class="item-label">任务反馈</p>
            </div>
            
            <!-- 第三行 -->
            <div class="grid-item">
                <div class="icon-wrapper bg-pink">
                    <svg viewBox="0 0 48 48" fill="none">
                        <rect x="10" y="10" width="28" height="30" rx="4" fill="#F48FB1"/>
                        <rect x="14" y="14" width="20" height="10" rx="2" fill="white"/>
                        <path d="M16 28L24 34L32 22" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <p class="item-label">异动申请</p>
            </div>
            
            <div class="grid-item" id="leaveApplication">
                <div class="icon-wrapper bg-green">
                    <svg viewBox="0 0 48 48" fill="none">
                        <rect x="10" y="10" width="28" height="30" rx="4" fill="#66BB6A"/>
                        <circle cx="24" cy="20" r="5" fill="white"/>
                        <path d="M22 18L24 22L28 16" stroke="#66BB6A" stroke-width="2" fill="none" stroke-linecap="round"/>
                        <line x1="14" y1="28" x2="30" y2="28" stroke="white" stroke-width="1.5"/>
                        <line x1="14" y1="32" x2="28" y2="32" stroke="white" stroke-width="1.5"/>
                    </svg>
                </div>
                <p class="item-label">请销假</p>
            </div>
            
            <div class="grid-item">
                <div class="icon-wrapper bg-pink">
                    <svg viewBox="0 0 48 48" fill="none">
                        <rect x="10" y="10" width="28" height="30" rx="4" fill="#F48FB1"/>
                        <path d="M14 32L24 20L34 32Z" fill="white"/>
                        <line x1="24" y1="20" x2="24" y2="32" stroke="white" stroke-width="1.5"/>
                    </svg>
                </div>
                <p class="item-label">第二课堂</p>
            </div>
            
            <div class="grid-item">
                <div class="icon-wrapper bg-blue">
                    <svg viewBox="0 0 48 48" fill="none">
                        <circle cx="24" cy="24" r="18" fill="#64B5F6"/>
                        <path d="M14 28L18 20L24 24L30 18L34 28L24 32Z" fill="white"/>
                    </svg>
                </div>
                <p class="item-label">校园风光</p>
            </div>
            
            <!-- 第四行 -->
            <div class="grid-item">
                <div class="icon-wrapper bg-blue">
                    <svg viewBox="0 0 48 48" fill="none">
                        <rect x="10" y="10" width="28" height="30" rx="4" fill="#64B5F6"/>
                        <circle cx="24" cy="18" r="4" fill="white"/>
                        <line x1="24" y1="22" x2="24" y2="32" stroke="white" stroke-width="2"/>
                        <line x1="18" y1="26" x2="30" y2="26" stroke="white" stroke-width="1.5"/>
                        <line x1="18" y1="30" x2="28" y2="30" stroke="white" stroke-width="1.5"/>
                    </svg>
                </div>
                <p class="item-label">校园答题</p>
            </div>
            
            <div class="grid-item">
                <div class="icon-wrapper bg-pink">
                    <svg viewBox="0 0 48 48" fill="none">
                        <rect x="12" y="14" width="24" height="26" rx="4" fill="#F48FB1"/>
                        <ellipse cx="24" cy="22" rx="8" ry="6" fill="white"/>
                        <rect x="18" y="26" width="12" height="10" rx="2" fill="white"/>
                        <rect x="20" y="28" width="8" height="6" rx="1" fill="#F48FB1"/>
                    </svg>
                </div>
                <p class="item-label">失物招领</p>
            </div>
            
            <div class="grid-item">
                <div class="icon-wrapper bg-yellow">
                    <svg viewBox="0 0 48 48" fill="none">
                        <path d="M24 8L38 20V32C38 37.5 33.5 42 28 42H20C14.5 42 10 37.5 10 32V20L24 8Z" fill="#FFB74D"/>
                        <path d="M24 14L34 23V32C34 35.3 31.3 38 28 38H20C16.7 38 14 35.3 14 32V23L24 14Z" fill="white"/>
                        <path d="M20 24L24 28L30 22" stroke="#FFB74D" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <p class="item-label">权益维护</p>
            </div>
            
            <div class="grid-item">
                <div class="icon-wrapper bg-green">
                    <svg viewBox="0 0 48 48" fill="none">
                        <rect x="10" y="10" width="28" height="30" rx="4" fill="#66BB6A"/>
                        <rect x="14" y="14" width="20" height="22" rx="2" fill="white"/>
                        <path d="M18 18L20 26L28 20" stroke="#66BB6A" stroke-width="1.5" fill="none"/>
                        <rect x="22" y="26" width="8" height="6" rx="1" fill="#66BB6A"/>
                    </svg>
                </div>
                <p class="item-label">校园指南</p>
            </div>
            
            <!-- 第五行 -->
            <div class="grid-item">
                <div class="icon-wrapper bg-pink">
                    <svg viewBox="0 0 48 48" fill="none">
                        <rect x="10" y="12" width="28" height="28" rx="4" fill="#F48FB1"/>
                        <rect x="14" y="16" width="20" height="16" rx="2" fill="white"/>
                        <rect x="16" y="18" width="8" height="12" rx="1" fill="#F48FB1"/>
                        <circle cx="26" cy="22" r="3" fill="#F48FB1"/>
                        <line x1="24" y1="28" x2="30" y2="28" stroke="#F48FB1" stroke-width="1.5"/>
                    </svg>
                </div>
                <p class="item-label">设备识别</p>
            </div>
            
            <div class="grid-item">
                <div class="icon-wrapper bg-green">
                    <svg viewBox="0 0 48 48" fill="none">
                        <circle cx="24" cy="24" r="18" fill="#66BB6A"/>
                        <circle cx="24" cy="24" r="12" fill="white"/>
                        <path d="M18 24L22 28L30 20" stroke="#66BB6A" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <p class="item-label">认证绑定</p>
            </div>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 点击事件
            const clickableElements = document.querySelectorAll('.grid-item');
            clickableElements.forEach(element => {
                element.addEventListener('click', function() {
                    // 判断点击的是否是请销假元素
                    if (this.querySelector('.item-label').textContent === '请销假') {
                        window.location.href = 'yiban前端3.html';
                    }
                });
            });

            // 返回首页
            const backButton = document.getElementById('backButton1');
            backButton.addEventListener('click', function() {
                window.location.href = 'index.html';
            });
        });
    </script>
</body>
</html>
